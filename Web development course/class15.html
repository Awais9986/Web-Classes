<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <script>

        let myPromise = new Promise((resolve, reject)=>{

            // api call
            // get data from database
            let dataSuccessfully = false;

            if (dataSuccessfully) {
                resolve("Hey I get the data from API")
            }
            else{
                reject("404 error")
            }


        })


       
        myPromise.then((data)=>{
            console.log(data);
            
        }).catch((error)=>{
            console.log(error);
            
        })
        

    </script>
</body>
</html>
