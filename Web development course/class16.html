<body>
    <script>
            let dataFromApi = new Promise((resolve, reject) =>{
                let data = false;

                setTimeout(() => {
                  
                    if (data) {
                    resolve("this is user data")
                }
                else{
                    reject("something went wrong")
                }
                }, 5000);

             
            })  

                dataFromApi.then((data)=>{
                    console.log(data);
                    
                }).catch((error)=>{
                console.log(error);
                
            })
            console.log(dataFromApi);
            

    </script>
