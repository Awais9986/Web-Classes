<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>GitHub Profile Card</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 2rem;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            min-height: 100vh;
        }

        .search-box {
            margin-bottom: 2rem;
        }

        .search-box input[type="text"] {
            padding: 0.75rem 1rem;
            width: 300px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 1rem;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
        }

        .card {
            background-color: #ffffff;
            width: 350px;
            border-radius: 12px;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.1);
            padding: 2rem;
            text-align: center;
        }

        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 1rem;
            border: 3px solid #0366d6;
        }

        .name {
            font-size: 1.5rem;
            font-weight: bold;
            margin: 0.5rem 0;
        }

        .username {
            color: #555;
            font-size: 1rem;
            margin-bottom: 1rem;
        }

        .bio {
            font-size: 0.95rem;
            color: #444;
            margin-bottom: 1rem;
        }

        .location {
            font-size: 0.9rem;
            color: #777;
            margin-bottom: 1rem;
        }

        .links a {
            text-decoration: none;
            color: #0366d6;
            font-weight: 500;
            margin: 0 0.5rem;
        }

        @media (max-width: 400px) {
            .card {
                width: 90%;
            }

            .search-box input {
                width: 90%;
            }
        }

        button {
            padding: 12px;
            background-color: royalblue;
            color: white;
            border: none;
            outline: none;
            border-radius: 6px;
        }
        .loader {
  border: 16px solid #f3f3f3; /* Light grey */
  border-top: 16px solid #3498db; /* Blue */
  border-radius: 50%;
  width: 120px;
  height: 120px;
  animation: spin 2s linear infinite;
}

@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}
    </style>
</head>

<body>

    <div class="search-box">
        <input type="text" id="search-input" placeholder="Enter GitHub username..." />
        <button id="search-btn">Search</button>
    </div>

   <div class="card-parent">
     <div class="card">
        <img src="https://avatars.githubusercontent.com/u/583231?v=4" alt="Avatar" class="avatar" />
        <div class="name">The Octocat</div>
        <div class="username">@octocat</div>
        <div class="bio">I love to explore the world of open source and build cool things!</div>
        <div class="location">San Francisco, CA</div>
        <div class="links">
            <a href="https://github.com/octocat" target="_blank">GitHub</a>
            <a href="#">Website</a>
        </div>
    </div>
   </div>



    <script>


        let cardParent = document.querySelector(".card-parent")
        let searchBtn = document.querySelector("#search-btn")
        let searchInput = document.querySelector("#search-input")


        async function apiCall(username) {
            console.log(username);
            
            let response = await fetch(`https://api.github.com/users/${username}`)
            let data = await response.json()

           
            
            let card = `
            <div class="card">
                    <img src="${data.avatar_url}" alt="Avatar" class="avatar" />
                    <div class="name">${data.name}</div>
                    <div class="username">@${data.login}</div>
                    <div class="bio">${data.bio ? data.bio : "pasa kusa"}</div>
                    <div class="location">${data.location ? data.location : "pasa kusa"}</div>
                    <div class="links">
                    <a href="${data.url}" target="_blank">GitHub</a>
                    <a href="#">Website</a>
                    </div>
  </div>
            
            `

            cardParent.innerHTML = card

        
        
        
        }



        searchBtn.addEventListener("click", ()=>{
       
            
            if(searchInput.value){
                console.log(searchInput.value);

                cardParent.innerHTML = `<div class="loader"></div>`
                
                apiCall(searchInput.value)

            }
        })







    </script>
</body>

</html>
